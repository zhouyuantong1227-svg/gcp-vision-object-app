apiVersion: v1
kind: ServiceAccount
metadata:
  name: vision-app-ksa
  namespace: vision-app
  annotations:
    iam.gke.io/gcp-service-account: ${GCP_SERVICE_ACCOUNT}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-object-app
  namespace: vision-app
  labels:
    app: vision-object-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-object-app
  template:
    metadata:
      labels:
        app: vision-object-app
    spec:
      serviceAccountName: vision-app-ksa
      containers:
        - name: web
          image: ${IMAGE_URI}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vision-object-app
  namespace: vision-app
spec:
  type: LoadBalancer
  selector:
    app: vision-object-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vision-object-app
  namespace: vision-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vision-object-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

